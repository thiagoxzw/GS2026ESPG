<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>HOLOPASS — Smart Band</title>
<style>
  :root{
    --bg-0:#050a18;
    --bg-1:#0a1730;
    --ink:#cfe4ff;
    --ink-dim:#6f86a8;
    --cyan:#46e3ff;
    --cyan-dim:#1f5d72;
    --amber:#ffb347;
    --green:#5dff9b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(120% 80% at 50% 30%, #0e1d3a 0%, #050a18 60%, #02050d 100%);color:var(--ink);font-family:"Inter","Helvetica Neue",Helvetica,Arial,sans-serif;overflow:hidden}
  canvas{display:block}
  #stage{position:fixed;inset:0}
  /* HUD */
  .hud{position:fixed;inset:0;pointer-events:none;font-family:"JetBrains Mono","SF Mono",ui-monospace,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim)}
  .hud .tl{position:absolute;top:22px;left:24px;pointer-events:auto}
  .hud .tr{position:absolute;top:22px;right:24px;text-align:right}
  .hud .bl{position:absolute;bottom:22px;left:24px}
  .hud .br{position:absolute;bottom:22px;right:24px;text-align:right;pointer-events:auto}
  .hud .brand{font-family:"Inter",sans-serif;font-weight:700;font-size:13px;letter-spacing:.36em;color:var(--ink)}
  .hud .brand .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);transform:translateY(-2px);margin-right:8px}
  .hud .crosshair{position:absolute;top:50%;left:50%;width:1px;height:1px;transform:translate(-50%,-50%)}
  .hud .crosshair::before,.hud .crosshair::after{content:"";position:absolute;left:50%;top:50%;background:rgba(70,227,255,.18)}
  .hud .crosshair::before{width:1px;height:140px;transform:translate(-50%,-50%)}
  .hud .crosshair::after{width:140px;height:1px;transform:translate(-50%,-50%)}
  .ticks{position:absolute;left:24px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;color:var(--cyan-dim);font-size:9px}
  .ticks span{display:flex;align-items:center;gap:8px}
  .ticks i{display:inline-block;width:14px;height:1px;background:currentColor;font-style:normal}
  .corner{position:absolute;width:18px;height:18px;border:1px solid rgba(70,227,255,.35)}
  .corner.tl{top:14px;left:14px;border-right:none;border-bottom:none}
  .corner.tr{top:14px;right:14px;border-left:none;border-bottom:none}
  .corner.bl{bottom:14px;left:14px;border-right:none;border-top:none}
  .corner.br{bottom:14px;right:14px;border-left:none;border-top:none}
  .legend{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;align-items:center}
  .legend b{color:var(--ink);font-weight:500}
  .pill{display:inline-block;padding:4px 10px;border:1px solid rgba(70,227,255,.4);border-radius:999px;color:var(--cyan);font-size:10px;letter-spacing:.18em}
  .btnrow{display:flex;gap:8px;margin-top:10px}
  .btnrow button{font-family:inherit;font-size:10px;letter-spacing:.18em;text-transform:uppercase;background:rgba(70,227,255,.06);color:var(--ink);border:1px solid rgba(70,227,255,.25);padding:6px 12px;cursor:pointer;border-radius:2px}
  .btnrow button:hover{background:rgba(70,227,255,.14);border-color:rgba(70,227,255,.55)}
  .btnrow button.on{background:rgba(70,227,255,.22);border-color:var(--cyan);color:#fff}
  .scan{position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(70,227,255,.55) 50%,transparent 100%);animation:scan 5s ease-in-out infinite;mix-blend-mode:screen}
  @keyframes scan{0%{top:18%}50%{top:82%}100%{top:18%}}
  .grid-bg{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(70,227,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(70,227,255,.04) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(80% 60% at 50% 50%,#000 30%,transparent 80%)}
</style>
</head>
<body>
<div id="stage"></div>
<div class="grid-bg"></div>
<div class="scan"></div>
<div class="hud">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div class="tl">
    <div class="brand"><span class="dot"></span>HOLOPASS</div>
    <div style="margin-top:6px;font-size:9px">CONCEITO · BAND v2 · MÓDULO EMBUTIDO</div>
  </div>

  <div class="tr">
    <span class="pill">RENDER · 3D PREVIEW</span>
    <div style="margin-top:10px;font-size:9px">REV 02 · MAY 2026</div>
    <div style="font-size:9px;color:var(--ink-dim)">— ARRASTE PARA GIRAR —</div>
  </div>

  <div class="ticks">
    <span><i></i>01 · COURO</span>
    <span><i></i>02 · ALUMÍNIO</span>
    <span><i></i>03 · AMOLED</span>
    <span><i></i>04 · NFC</span>
    <span><i></i>05 · LED</span>
  </div>

  <div class="bl">
    <div class="legend" style="font-size:10px">
      <span style="color:var(--cyan)">DIM</span><b>34 × 11 × 8 mm</b>
      <span style="color:var(--cyan)">DISP</span><b>1.4" AMOLED · 240×100</b>
      <span style="color:var(--cyan)">VIDRO</span><b>Gorilla 2.5D</b>
      <span style="color:var(--cyan)">BAT</span><b>14 dias · ~18 g</b>
    </div>
  </div>

  <div class="br">
    <div style="font-size:10px;margin-bottom:6px">VISTAS</div>
    <div class="btnrow">
      <button data-view="perspective" class="on">3/4</button>
      <button data-view="top">TOPO</button>
      <button data-view="side">LATERAL</button>
      <button data-view="back">VERSO</button>
    </div>
    <div class="btnrow">
      <button data-toggle="spin">↻ ROT</button>
      <button data-toggle="wire">WIRE</button>
      <button data-toggle="annot" class="on">ANOT</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const stage = document.getElementById("stage");
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x050a18, 14, 38);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(7, 5.2, 9.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 4;
controls.maxDistance = 22;
controls.target.set(0, 0.3, 0);

// === lighting =============================================================
scene.add(new THREE.AmbientLight(0x4a6488, 0.45));

const key = new THREE.DirectionalLight(0xffffff, 1.4);
key.position.set(6, 9, 6);
scene.add(key);

const rim = new THREE.DirectionalLight(0x46e3ff, 1.2);
rim.position.set(-6, 4, -4);
scene.add(rim);

const fill = new THREE.PointLight(0xff9a52, 0.7, 18);
fill.position.set(-3, 2, 5);
scene.add(fill);

// holographic glow under the band
const glow = new THREE.PointLight(0x46e3ff, 0.9, 8);
glow.position.set(0, -1.2, 0);
scene.add(glow);

// === leather strap (curved, with cutout for the module) ===================
// We build the strap from two pieces: left side and right side, leaving a flat seat
// in the middle that the module slots into. The module's bottom matches the strap top,
// and side caps wrap the cut edges → looks embedded, not stuck on.

const strapGroup = new THREE.Group();
scene.add(strapGroup);

// the wrist (invisible ghost cylinder, just for curvature reference)
const wristR = 2.6;             // radius of the wrist
const wristY = -wristR + 0.45;  // center the band roughly at y=0 on top
const strapWidth = 1.5;         // along Z
const strapThick = 0.22;        // depth into the wrist
const moduleArcHalf = 0.55;     // half-angle taken by module on the strap (radians ~ along X)

// leather material
const leatherTex = makeLeatherTexture();
const stitchTex  = makeStitchTexture();

const leatherMat = new THREE.MeshStandardMaterial({
  map: leatherTex,
  bumpMap: leatherTex,
  bumpScale: 0.015,
  color: 0x6b3a1f,
  roughness: 0.78,
  metalness: 0.05
});

// Build strap as a tube around the wrist using a custom geometry, but skip the
// middle arc (where the module sits). Two halves — visible front, hidden back.
function buildStrapHalf(arcStart, arcEnd){
  const segs = 96;
  const widthSegs = 6;
  const geo = new THREE.PlaneGeometry(1, 1, segs, widthSegs);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++){
    const u = (pos.getX(i) + 0.5);            // 0..1 along arc
    const v = (pos.getY(i) + 0.5);            // 0..1 across width
    const a = arcStart + u * (arcEnd - arcStart); // angle from +Y top
    const r = wristR;
    const x = Math.sin(a) * r;
    const y = Math.cos(a) * r + wristY;
    const z = (v - 0.5) * strapWidth;
    pos.setXYZ(i, x, y, z);
  }
  geo.computeVertexNormals();
  // UVs already 0..1 — tile them
  const uv = geo.attributes.uv;
  for (let i = 0; i < uv.count; i++){
    uv.setXY(i, uv.getX(i) * 4, uv.getY(i) * 1);
  }
  return geo;
}

// outer (visible) surface
const halfLeft  = new THREE.Mesh(buildStrapHalf(-Math.PI*0.95, -moduleArcHalf), leatherMat);
const halfRight = new THREE.Mesh(buildStrapHalf( moduleArcHalf, Math.PI*0.95), leatherMat);
strapGroup.add(halfLeft, halfRight);

// inner (under) leather — slightly darker, sits at smaller radius
const leatherInnerMat = leatherMat.clone();
leatherInnerMat.color = new THREE.Color(0x3d2010);
leatherInnerMat.roughness = 0.95;

function buildStrapInner(arcStart, arcEnd){
  const segs = 96;
  const widthSegs = 6;
  const geo = new THREE.PlaneGeometry(1, 1, segs, widthSegs);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++){
    const u = (pos.getX(i) + 0.5);
    const v = (pos.getY(i) + 0.5);
    const a = arcStart + u * (arcEnd - arcStart);
    const r = wristR - strapThick;
    const x = Math.sin(a) * r;
    const y = Math.cos(a) * r + wristY;
    const z = (v - 0.5) * strapWidth;
    pos.setXYZ(i, x, y, z);
  }
  geo.computeVertexNormals();
  return geo;
}
const innerLeft  = new THREE.Mesh(buildStrapInner(-Math.PI*0.95, -moduleArcHalf), leatherInnerMat);
const innerRight = new THREE.Mesh(buildStrapInner( moduleArcHalf, Math.PI*0.95), leatherInnerMat);
innerLeft.rotation.x = innerLeft.rotation.y = 0; // flipped via geom winding below
// We need the inner faces to face inward; flip via material side
leatherInnerMat.side = THREE.BackSide;
strapGroup.add(innerLeft, innerRight);

// side walls of the strap (thickness ribbons) at the cut edge — gives depth where
// the module meets leather. Build short ribbons along the strap edges.
function buildEdgeRibbon(arcStart, arcEnd, zSign){
  const segs = 96;
  const geo = new THREE.PlaneGeometry(1, 1, segs, 1);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++){
    const u = (pos.getX(i) + 0.5);
    const v = (pos.getY(i) + 0.5);    // 0 outer, 1 inner
    const a = arcStart + u * (arcEnd - arcStart);
    const r = wristR - v * strapThick;
    const x = Math.sin(a) * r;
    const y = Math.cos(a) * r + wristY;
    const z = zSign * strapWidth/2;
    pos.setXYZ(i, x, y, z);
  }
  geo.computeVertexNormals();
  return geo;
}
const edgeMat = leatherMat.clone();
edgeMat.color = new THREE.Color(0x4a2611);
edgeMat.roughness = 0.85;
edgeMat.side = THREE.DoubleSide;
strapGroup.add(
  new THREE.Mesh(buildEdgeRibbon(-Math.PI*0.95, -moduleArcHalf,  1), edgeMat),
  new THREE.Mesh(buildEdgeRibbon(-Math.PI*0.95, -moduleArcHalf, -1), edgeMat),
  new THREE.Mesh(buildEdgeRibbon( moduleArcHalf, Math.PI*0.95,  1), edgeMat),
  new THREE.Mesh(buildEdgeRibbon( moduleArcHalf, Math.PI*0.95, -1), edgeMat),
);

// stitching — thin lines along each strap edge
const stitchMat = new THREE.MeshStandardMaterial({ color: 0xd8b88a, roughness: 0.7, metalness: 0.0 });
function buildStitch(arcStart, arcEnd, zSign){
  const pts = [];
  const segs = 80;
  for (let i = 0; i <= segs; i++){
    const u = i/segs;
    const a = arcStart + u*(arcEnd - arcStart);
    const r = wristR + 0.005;
    const x = Math.sin(a)*r;
    const y = Math.cos(a)*r + wristY;
    const z = zSign * (strapWidth/2 - 0.07);
    pts.push(new THREE.Vector3(x, y, z));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const geo = new THREE.TubeGeometry(curve, 100, 0.012, 6, false);
  return new THREE.Mesh(geo, stitchMat);
}
strapGroup.add(
  buildStitch(-Math.PI*0.95, -moduleArcHalf,  1),
  buildStitch(-Math.PI*0.95, -moduleArcHalf, -1),
  buildStitch( moduleArcHalf, Math.PI*0.95,  1),
  buildStitch( moduleArcHalf, Math.PI*0.95, -1),
);

// buckle hint at far end
const buckle = new THREE.Mesh(
  new THREE.TorusGeometry(0.18, 0.04, 12, 32),
  new THREE.MeshStandardMaterial({ color: 0xb8b8c0, metalness: 0.9, roughness: 0.25 })
);
{
  const a = -Math.PI*0.95;
  buckle.position.set(Math.sin(a)*wristR*1.05, Math.cos(a)*wristR*1.05 + wristY, 0);
  buckle.rotation.y = a - Math.PI/2;
  buckle.rotation.x = Math.PI/2;
}
strapGroup.add(buckle);

// === MODULE ===============================================================
// flat horizontal pastille that follows the strap arc. Bottom curved to match
// the wrist radius, top nearly flat with a 2.5D glass dome.
const moduleGroup = new THREE.Group();
strapGroup.add(moduleGroup);

// module body — built from a curved box that hugs the strap arc
function buildModuleBody(arcHalf, widthZ, heightOut, color, roughness, metalness){
  const segs = 64;
  // Two surfaces (top arc, bottom arc) + side faces. We'll construct as a ring sector.
  // top outer radius = wristR + heightOut, bottom = wristR
  const rOuter = wristR + heightOut;
  const rInner = wristR + 0.005;

  const grp = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color, roughness, metalness });

  // top curved face
  const topGeo = new THREE.PlaneGeometry(1,1,segs,4);
  {
    const pos = topGeo.attributes.position;
    for (let i = 0; i < pos.count; i++){
      const u = (pos.getX(i)+0.5);
      const v = (pos.getY(i)+0.5);
      const a = -arcHalf + u*(arcHalf*2);
      const x = Math.sin(a)*rOuter;
      const y = Math.cos(a)*rOuter + wristY;
      const z = (v-0.5)*widthZ;
      pos.setXYZ(i, x, y, z);
    }
    topGeo.computeVertexNormals();
  }
  grp.add(new THREE.Mesh(topGeo, mat));

  // bottom curved face (faces down/in)
  const botGeo = new THREE.PlaneGeometry(1,1,segs,4);
  {
    const pos = botGeo.attributes.position;
    for (let i = 0; i < pos.count; i++){
      const u = (pos.getX(i)+0.5);
      const v = (pos.getY(i)+0.5);
      const a = -arcHalf + u*(arcHalf*2);
      const x = Math.sin(a)*rInner;
      const y = Math.cos(a)*rInner + wristY;
      const z = (v-0.5)*widthZ;
      pos.setXYZ(i, x, y, z);
    }
    botGeo.computeVertexNormals();
  }
  const botMesh = new THREE.Mesh(botGeo, mat);
  botMesh.material = mat.clone();
  botMesh.material.side = THREE.BackSide;
  grp.add(botMesh);

  // front/back side rings
  function ribbon(zSign){
    const geo = new THREE.PlaneGeometry(1,1,segs,1);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++){
      const u = (pos.getX(i)+0.5);
      const v = (pos.getY(i)+0.5);  // 0 bottom -> 1 top
      const a = -arcHalf + u*(arcHalf*2);
      const r = rInner + v*(rOuter - rInner);
      const x = Math.sin(a)*r;
      const y = Math.cos(a)*r + wristY;
      const z = zSign*widthZ/2;
      pos.setXYZ(i, x, y, z);
    }
    geo.computeVertexNormals();
    const m = mat.clone();
    m.side = THREE.DoubleSide;
    return new THREE.Mesh(geo, m);
  }
  grp.add(ribbon( 1));
  grp.add(ribbon(-1));

  return grp;
}

// Main aluminum module
const moduleHeight = 0.12;            // sits 3mm above strap (scaled)
const moduleWidthZ = strapWidth * 0.92;
const moduleBody = buildModuleBody(moduleArcHalf, moduleWidthZ, moduleHeight, 0x1a1c22, 0.32, 0.85);
moduleGroup.add(moduleBody);

// Brushed aluminum frame (slightly bigger, lighter ring around top)
const frame = buildModuleBody(moduleArcHalf*1.005, moduleWidthZ*1.04, moduleHeight*0.55, 0x2a2d36, 0.45, 0.9);
frame.position.y -= 0.01;
moduleGroup.add(frame);

// === side end caps — capsules that wrap the cut edges of the strap ========
const capMat = new THREE.MeshStandardMaterial({ color: 0x2a2d36, roughness: 0.32, metalness: 0.9 });
const capInnerR = wristR - strapThick + 0.01;
const capOuterR = wristR + moduleHeight + 0.01;

function buildSideCap(sign){
  // a semi-capsule that follows the strap arc at the module edge, spanning the
  // strap thickness and a bit more, with rounded outer profile.
  const grp = new THREE.Group();
  const a = sign * moduleArcHalf;
  // place a torus-section that hugs the cut
  const seg = 32;
  const arcSpan = 0.06; // radians along the strap arc (axial extent of cap)
  const radial = 0.18;  // half-width across Z

  // Build a lathe profile in (r, h) and revolve along the strap normal
  const profile = [];
  const steps = 16;
  for (let i = 0; i <= steps; i++){
    const t = i/steps;
    // an arc from inner-bottom to outer-top forming a capsule cross-section
    const ang = Math.PI*(1.0 - t);  // π → 0
    const cr = (capOuterR - capInnerR)/2;
    const cc = (capOuterR + capInnerR)/2;
    const r = cc + cr*Math.cos(ang);
    const h = radial*Math.sin(ang);
    profile.push(new THREE.Vector2(h, r - wristR)); // x = z extent, y = radial offset
  }
  // revolve along strap arc direction by sweeping the profile through arcSpan
  const geo = new THREE.BufferGeometry();
  const verts = [];
  const norms = [];
  const idx = [];
  const azSteps = 24;
  for (let j = 0; j <= azSteps; j++){
    const tj = j/azSteps;
    const az = a + (tj - 0.5)*arcSpan;
    for (let i = 0; i < profile.length; i++){
      const p = profile[i];
      const r = wristR + p.y;
      const x = Math.sin(az)*r;
      const y = Math.cos(az)*r + wristY;
      const z = p.x * sign * 0 + p.x; // p.x is z extent
      verts.push(x, y, z);
    }
  }
  // index
  const rows = azSteps + 1;
  const cols = profile.length;
  for (let j = 0; j < azSteps; j++){
    for (let i = 0; i < cols - 1; i++){
      const a0 = j*cols + i;
      const b0 = a0 + 1;
      const c0 = a0 + cols;
      const d0 = c0 + 1;
      idx.push(a0,c0,b0, b0,c0,d0);
    }
  }
  geo.setAttribute("position", new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  grp.add(new THREE.Mesh(geo, capMat));
  return grp;
}
moduleGroup.add(buildSideCap(-1));
moduleGroup.add(buildSideCap( 1));

// little NFC dot label on right cap
const nfcLabel = new THREE.Mesh(
  new THREE.CircleGeometry(0.04, 24),
  new THREE.MeshStandardMaterial({ color: 0x46e3ff, emissive: 0x1a8aa8, roughness: 0.4, metalness: 0.2 })
);
{
  const a = moduleArcHalf + 0.02;
  const r = wristR + moduleHeight*0.5;
  nfcLabel.position.set(Math.sin(a)*r + 0.05, Math.cos(a)*r + wristY, 0);
  nfcLabel.lookAt(camera.position);
  // place on side cap, slightly out
  nfcLabel.position.set(0.95, 0.42, 0.18);
  nfcLabel.rotation.y = -Math.PI/4;
}
moduleGroup.add(nfcLabel);

// === DISPLAY (AMOLED landscape, sits flush on module top) =================
const displayCanvas = document.createElement("canvas");
displayCanvas.width = 480;
displayCanvas.height = 200;
const dctx = displayCanvas.getContext("2d");
const displayTex = new THREE.CanvasTexture(displayCanvas);
displayTex.colorSpace = THREE.SRGBColorSpace;

function drawDisplay(t){
  const c = dctx, W = 480, H = 200;
  c.fillStyle = "#000";
  c.fillRect(0,0,W,H);

  // subtle AMOLED scanlines
  c.globalAlpha = 0.06;
  for (let y=0;y<H;y+=2){ c.fillStyle="#0ff"; c.fillRect(0,y,W,1); }
  c.globalAlpha = 1;

  // top status row
  c.font = "600 18px JetBrains Mono, ui-monospace, monospace";
  c.textBaseline = "middle";

  // NFC icon left
  c.fillStyle = "#46e3ff";
  c.fillText("◈ NFC", 22, 28);

  // Clock center
  c.fillStyle = "#cfe4ff";
  c.textAlign = "center";
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,"0");
  const mm = String(now.getMinutes()).padStart(2,"0");
  const blink = (Math.floor(t/500)%2===0) ? ":" : " ";
  c.fillText(`${hh}${blink}${mm}`, W/2, 28);

  // Battery right
  c.textAlign = "right";
  c.fillStyle = "#5dff9b";
  c.fillText("87%", W-22, 28);
  // tiny battery glyph
  c.strokeStyle = "#5dff9b";
  c.lineWidth = 2;
  c.strokeRect(W-86, 20, 26, 16);
  c.fillRect(W-60, 25, 3, 6);
  c.fillRect(W-84, 22, Math.round(22*0.87), 12);

  // divider
  c.strokeStyle = "rgba(70,227,255,0.25)";
  c.beginPath(); c.moveTo(18, 56); c.lineTo(W-18, 56); c.stroke();

  // big balance
  c.textAlign = "left";
  c.font = "500 22px Inter, sans-serif";
  c.fillStyle = "#6f86a8";
  c.fillText("SALDO", 24, 80);

  c.font = "700 64px Inter, sans-serif";
  c.fillStyle = "#ffffff";
  c.fillText("R$ 47,10", 22, 130);

  // next trip
  c.font = "500 16px Inter, sans-serif";
  c.fillStyle = "#46e3ff";
  c.fillText("→  ÔNIBUS 477 · 4 MIN · PLATAFORMA B", 24, 178);

  displayTex.needsUpdate = true;
}
drawDisplay(0);

// the display: a slightly inset curved rectangle on top of the module
function buildDisplayGeometry(arcHalf, widthZ){
  const segs = 64;
  const r = wristR + moduleHeight + 0.001;
  const geo = new THREE.PlaneGeometry(1, 1, segs, 6);
  const pos = geo.attributes.position;
  const uv = geo.attributes.uv;
  // inset
  const inset = 0.85;
  for (let i = 0; i < pos.count; i++){
    const u = (pos.getX(i)+0.5);
    const v = (pos.getY(i)+0.5);
    const a = -arcHalf*inset + u*(arcHalf*2*inset);
    const x = Math.sin(a)*r;
    const y = Math.cos(a)*r + wristY;
    const z = (v-0.5)*widthZ*inset;
    pos.setXYZ(i, x, y, z);
  }
  geo.computeVertexNormals();
  return geo;
}
const displayMesh = new THREE.Mesh(
  buildDisplayGeometry(moduleArcHalf, moduleWidthZ),
  new THREE.MeshBasicMaterial({ map: displayTex })
);
moduleGroup.add(displayMesh);

// Glass dome — slightly larger and higher, transparent, with reflection
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0,
  roughness: 0.05,
  transmission: 0.85,
  thickness: 0.2,
  transparent: true,
  opacity: 0.4,
  clearcoat: 1,
  clearcoatRoughness: 0.02,
  ior: 1.5
});
function buildGlassDome(arcHalf, widthZ){
  const segs = 64;
  const r0 = wristR + moduleHeight + 0.002;
  const bulge = 0.04;
  const geo = new THREE.PlaneGeometry(1, 1, segs, 8);
  const pos = geo.attributes.position;
  const inset = 0.95;
  for (let i = 0; i < pos.count; i++){
    const u = (pos.getX(i)+0.5);
    const v = (pos.getY(i)+0.5);
    // soften edges (bulge in middle)
    const eu = Math.sin(Math.PI*u);
    const ev = Math.sin(Math.PI*v);
    const r = r0 + bulge*eu*ev;
    const a = -arcHalf*inset + u*(arcHalf*2*inset);
    const x = Math.sin(a)*r;
    const y = Math.cos(a)*r + wristY;
    const z = (v-0.5)*widthZ*inset;
    pos.setXYZ(i, x, y, z);
  }
  geo.computeVertexNormals();
  return geo;
}
moduleGroup.add(new THREE.Mesh(buildGlassDome(moduleArcHalf, moduleWidthZ), glassMat));

function addAnnot(text, pos){
  const c = document.createElement("canvas");
  c.width = 512; c.height = 128;
  const x = c.getContext("2d");
  x.font = "500 36px JetBrains Mono, monospace";
  x.fillStyle = "rgba(70,227,255,0.9)";
  x.textBaseline = "middle";
  // tick line
  x.strokeStyle = "rgba(70,227,255,0.7)";
  x.lineWidth = 2;
  x.beginPath(); x.moveTo(8, 64); x.lineTo(80, 64); x.stroke();
  x.fillText(text, 96, 64);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;

  spr.position.copy(pos);
  spr.scale.set(2.2, 0.55, 1);

}

// === procedural textures ==================================================
function makeLeatherTexture(){
  const c = document.createElement("canvas");
  c.width = c.height = 512;
  const x = c.getContext("2d");
  // base
  const g = x.createLinearGradient(0,0,512,512);
  g.addColorStop(0, "#5a3018");
  g.addColorStop(1, "#7b4422");
  x.fillStyle = g; x.fillRect(0,0,512,512);
  // grain noise
  for (let i = 0; i < 6000; i++){
    const px = Math.random()*512, py = Math.random()*512;
    const v = (Math.random()-0.5)*40;
    x.fillStyle = `rgba(${50+v},${28+v*0.5},${12+v*0.3},${Math.random()*0.4})`;
    x.fillRect(px, py, 1+Math.random()*2, 1+Math.random()*2);
  }
  // pores
  for (let i = 0; i < 1500; i++){
    const px = Math.random()*512, py = Math.random()*512;
    x.beginPath();
    x.arc(px, py, 0.5+Math.random()*1.2, 0, Math.PI*2);
    x.fillStyle = `rgba(20,10,5,${0.3+Math.random()*0.4})`;
    x.fill();
  }
  // soft highlights
  for (let i = 0; i < 30; i++){
    const px = Math.random()*512, py = Math.random()*512;
    const rad = 20+Math.random()*40;
    const gg = x.createRadialGradient(px,py,0, px,py,rad);
    gg.addColorStop(0,"rgba(180,120,60,0.06)");
    gg.addColorStop(1,"rgba(180,120,60,0)");
    x.fillStyle = gg;
    x.fillRect(px-rad, py-rad, rad*2, rad*2);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
function makeStitchTexture(){
  const c = document.createElement("canvas");
  c.width = 128; c.height = 16;
  const x = c.getContext("2d");
  x.fillStyle = "#3a1f10";
  x.fillRect(0,0,128,16);
  x.fillStyle = "#d8b88a";
  for (let i = 0; i < 8; i++){
    x.fillRect(i*16+2, 6, 12, 4);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

// === interactions ==========================================================
let viewState = "perspective";
let spin = false;
let wireMode = false;
let annotsOn = true;

const camStates = {
  perspective: { pos:[7, 5.2, 9.5], tgt:[0, 0.3, 0] },
  top:         { pos:[0.001, 11, 0.01], tgt:[0, 0, 0] },
  side:        { pos:[0, 1.0, 12],      tgt:[0, 0.3, 0] },
  back:        { pos:[0, -8, 6],        tgt:[0, -1.5, 0] }
};
function goView(name){
  const s = camStates[name];
  if (!s) return;
  viewState = name;
  animateCam(s.pos, s.tgt);
}
function animateCam(pos, tgt){
  const start = camera.position.clone();
  const startT = controls.target.clone();
  const endP = new THREE.Vector3(...pos);
  const endT = new THREE.Vector3(...tgt);
  const dur = 700, t0 = performance.now();
  function step(now){
    const k = Math.min(1, (now - t0)/dur);
    const e = 1 - Math.pow(1-k, 3);
    camera.position.lerpVectors(start, endP, e);
    controls.target.lerpVectors(startT, endT, e);
    controls.update();
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

document.querySelectorAll("[data-view]").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("[data-view]").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    goView(b.dataset.view);
  };
});
document.querySelectorAll("[data-toggle]").forEach(b=>{
  b.onclick = ()=>{
    const t = b.dataset.toggle;
    if (t === "spin"){ spin = !spin; b.classList.toggle("on", spin); }
    if (t === "wire"){
      wireMode = !wireMode;
      b.classList.toggle("on", wireMode);
      scene.traverse(o=>{ if (o.material && "wireframe" in o.material) o.material.wireframe = wireMode; });
    }
    if (t === "annot"){
      annotsOn = !annotsOn;
      b.classList.toggle("on", annotsOn);
      annots.visible = annotsOn;
    }
  };
});

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// === render loop ==========================================================
const clock = new THREE.Clock();
function loop(){
  const t = clock.getElapsedTime();
  if (spin) strapGroup.rotation.y = t*0.4;
  diamond.rotation.y = t*0.8;
  diamond.position.y = -1.9 + Math.sin(t*1.5)*0.06;
  // pulse the rings
  scene.children.forEach(ch=>{
    if (ch.geometry && ch.geometry.type === "RingGeometry" && ch.material.transparent){
      // skip
    }
  });
  drawDisplay(performance.now());
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
