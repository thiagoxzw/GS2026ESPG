<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Pulseira HoloPass com display e antena NFC">
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="50%" stop-color="#8b6f47"/>
      <stop offset="100%" stop-color="#3a2818"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#021018"/>
      <stop offset="100%" stop-color="#04222e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="320" fill="none"/>
  <!-- banda da pulseira -->
  <path d="M160 40 a120 120 0 0 1 0 240" fill="none" stroke="url(#band)" stroke-width="34" stroke-linecap="round"/>
  <path d="M160 40 a120 120 0 0 0 0 240" fill="none" stroke="url(#band)" stroke-width="34" stroke-linecap="round"/>
  <!-- módulo central -->
  <rect x="96" y="120" width="128" height="80" rx="16" fill="#11161f" stroke="#00f5ff" stroke-opacity="0.6" stroke-width="2"/>
  <rect x="108" y="132" width="104" height="56" rx="8" fill="url(#screen)"/>
  <!-- conteúdo do display -->
  <text x="160" y="150" text-anchor="middle" font-family="monospace" font-size="11" fill="#00f5ff">◈ NFC · GNSS</text>
  <text x="160" y="172" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#00ff88">R$ 45,50</text>
  <!-- led status -->
  <circle cx="118" cy="210" r="4" fill="#00ff88"/>
  <text x="160" y="214" text-anchor="middle" font-family="monospace" font-size="9" fill="#7d8b9c">HP-2147-BR</text>
</svg>
