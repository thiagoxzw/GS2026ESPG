<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Satélite GNSS emitindo sinal para a Terra">
  <defs>
    <radialGradient id="earth" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0a3d66"/>
      <stop offset="70%" stop-color="#052036"/>
      <stop offset="100%" stop-color="#020b18"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" fill="#020b18"/>
  <!-- estrelas -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="60" cy="50" r="1.6"/><circle cx="120" cy="90" r="1"/>
    <circle cx="400" cy="40" r="1.4"/><circle cx="440" cy="120" r="1"/>
    <circle cx="300" cy="60" r="1"/><circle cx="30" cy="160" r="1.2"/>
    <circle cx="460" cy="220" r="1.2"/><circle cx="80" cy="250" r="1"/>
  </g>
  <!-- Terra -->
  <circle cx="240" cy="300" r="140" fill="url(#earth)" stroke="#00f5ff" stroke-opacity="0.4"/>
  <path d="M150 300 q40 -28 90 -10 q40 14 90 -6" fill="none" stroke="#00ff88" stroke-opacity="0.5" stroke-width="3"/>
  <path d="M170 340 q40 -20 140 -6" fill="none" stroke="#00ff88" stroke-opacity="0.35" stroke-width="3"/>
  <!-- ondas de sinal -->
  <g fill="none" stroke="#00f5ff" stroke-width="2">
    <path d="M240 150 a60 60 0 0 1 0 0" opacity="0"/>
    <circle cx="240" cy="120" r="40" opacity="0.5"/>
    <circle cx="240" cy="120" r="64" opacity="0.3"/>
    <circle cx="240" cy="120" r="88" opacity="0.15"/>
  </g>
  <!-- satélite -->
  <g transform="translate(240 120)">
    <rect x="-16" y="-14" width="32" height="28" rx="4" fill="#11202e" stroke="#00f5ff"/>
    <rect x="-58" y="-10" width="36" height="20" rx="2" fill="url(#panel)"/>
    <rect x="22" y="-10" width="36" height="20" rx="2" fill="url(#panel)"/>
    <line x1="-22" y1="0" x2="-16" y2="0" stroke="#00f5ff" stroke-width="3"/>
    <line x1="16" y1="0" x2="22" y2="0" stroke="#00f5ff" stroke-width="3"/>
    <circle cx="0" cy="0" r="5" fill="#00ff88"/>
  </g>
</svg>
