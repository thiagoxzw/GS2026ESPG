<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0a1a30"/>
      <stop offset="100%" stop-color="#020b18"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#0099ff"/>
      <stop offset="100%" stop-color="#bf00ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Grade holográfica de fundo -->
  <g opacity="0.15" stroke="#00f5ff" stroke-width="1">
    <line x1="0"   y1="128" x2="512" y2="128"/>
    <line x1="0"   y1="256" x2="512" y2="256"/>
    <line x1="0"   y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0"   x2="128" y2="512"/>
    <line x1="256" y1="0"   x2="256" y2="512"/>
    <line x1="384" y1="0"   x2="384" y2="512"/>
  </g>

  <!-- Anel externo (pulseira) -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="18" filter="url(#glow)"/>

  <!-- Anel interno (display holográfico) -->
  <circle cx="256" cy="256" r="135" fill="none" stroke="#00f5ff" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="115" fill="rgba(0,20,50,0.4)"/>

  <!-- Símbolo holográfico central ◈ -->
  <text x="256" y="320" text-anchor="middle"
        font-family="Arial Black, sans-serif"
        font-size="180"
        fill="#00f5ff"
        font-weight="bold"
        filter="url(#glow)">◈</text>

  <!-- Pequenos pontos decorativos -->
  <circle cx="256" cy="48"  r="6" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="256" cy="464" r="6" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="48"  cy="256" r="6" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="464" cy="256" r="6" fill="#00f5ff" filter="url(#glow)"/>
</svg>
